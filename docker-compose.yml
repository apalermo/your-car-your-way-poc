services:
  postgres-db:
    image: postgres:18-alpine
    container_name: ycyw-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ycyw_db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - ycyw-network

  backend-api:
    build: ./backend
    container_name: ycyw-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/ycyw_db
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - postgres-db
    networks:
      - ycyw-network

  frontend-app:
    build: ./frontend
    container_name: ycyw-frontend
    ports:
      - "4200:80"
    depends_on:
      - backend-api
    networks:
      - ycyw-network

volumes:
  pgdata:

networks:
  ycyw-network:
    driver: bridge
