version: '3.8'

services:
  postgres-db:
    image: postgres:18-alpine
    container_name: ycyw-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ycyw-network

  backend-api:
    build: ./backend
    container_name: ycyw-backend
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - postgres-db
    networks:
      - ycyw-network

  frontend-app:
    build: ./frontend
    container_name: ycyw-frontend
    ports:
      - '80:80'
    depends_on:
      - backend-api
    networks:
      - ycyw-network

volumes:
  pgdata:

networks:
  ycyw-network:
    driver: bridge
